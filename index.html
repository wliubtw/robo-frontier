<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoboFrontier | 具身智能与物理AI情报局</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Marked.js to parse markdown text -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
    <header class="border-b border-slate-800 bg-slate-950/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <h1 class="text-xl font-bold tracking-tight text-sky-400">🤖 RoboFrontier</h1>
            <span class="text-xs bg-slate-800 text-slate-400 px-2.5 py-1 rounded-full font-medium border border-slate-700">Azure VM Autonomous Node</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-10">
        <!-- Live Article Container -->
        <article id="content" class="prose prose-invert max-w-none bg-slate-950 p-6 md:p-10 rounded-2xl border border-slate-800 shadow-xl leading-relaxed">
            <div class="flex flex-col items-center justify-center py-12 space-y-4">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-sky-500"></div>
                <p class="text-slate-400 text-sm">正在加载 Hermes Agent 编译的前沿快讯...</p>
            </div>
        </article>
    </main>

    <script>
        async function loadLatestArticle() {
            try {
                // Point directly to the huge markdown file generated by Hermes
                const response = await fetch('./2025-2026-ai-robotics-breakthroughs-review.md');
                if (!response.ok) throw new Error('Failed to fetch file');
                const markdownText = await response.text();
                
                // Strip out markdown frontmatter if the agent included it
                const cleanMarkdown = markdownText.replace(/^---[\s\S]*?---/, '');
                
                // Inject the beautifully rendered HTML
                document.getElementById('content').innerHTML = marked.parse(cleanMarkdown);
            } catch (error) {
                document.getElementById('content').innerHTML = `
                    <div class="text-center py-12">
                        <p class="text-red-400 font-medium">暂未加载到今日快讯</p>
                        <p class="text-slate-500 text-sm mt-2">系统将在每日 09:00 自动搜索并发布更新。</p>
                    </div>
                `;
            }
        }
        loadLatestArticle();
    </script>
</body>
</html>
